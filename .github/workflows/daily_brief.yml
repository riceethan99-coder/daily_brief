name: Daily Brief

on:
  schedule:
    # 6:00 AM UTC — adjust to match your local morning
    # UK GMT:  0 6 * * *   | UK BST (summer): 0 5 * * *
    # ET:     0 12 * * *   | PT:              0 15 * * *
    - cron: '0 6 * * *'
  workflow_dispatch: # allows manual trigger from the GitHub Actions UI

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily brief
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADING212_ISA_KEY: ${{ secrets.TRADING212_ISA_KEY }}
          TRADING212_ISA_SECRET: ${{ secrets.TRADING212_ISA_SECRET }}
          TRADING212_INVEST_KEY: ${{ secrets.TRADING212_INVEST_KEY }}
          TRADING212_INVEST_SECRET: ${{ secrets.TRADING212_INVEST_SECRET }}
        run: python main.py
